# .github/workflows/notify.yml
# data.js her guncellendiginde abonelere mail atar.
# Repo Settings > Secrets and variables > Actions > New repository secret:
#   SUPABASE_URL          -> https://XXXX.supabase.co
#   SUPABASE_SERVICE_KEY  -> Settings > API > service_role key (GIZLI, sadece buraya)
#   GMAIL_USER            -> gonderen gmail adresi
#   UNSUB_SECRET          -> unsub_setup.sql icindeki secret ile ayni deger
#   GMAIL_APP_PASSWORD    -> Google hesabi > Guvenlik > 2 adimli dogrulama > Uygulama sifreleri
name: Notify subscribers

on:
  push:
    paths:
      - "data.js"

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python notify.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          UNSUB_SECRET: ${{ secrets.UNSUB_SECRET }}
          SITE_URL: https://ceude.github.io/HHBahn
      - name: Commit dip bayrakli data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "chore: dip fiyat bayraklari [skip ci]"
          git push
